services:
  mariadb:
    build: requirements/mariadb
    image: mariadb
    env_file: .env
    restart: always
    volumes:
      - wordpress_db:/var/lib/mysql
    networks:
      - inception
  wordpress:
    build: requirements/wordpress
    image: wordpress
    env_file: .env
    restart: always
    depends_on:
      - mariadb
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception
  nginx:
    build: requirements/nginx
    image: nginx
    env_file: .env
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception

networks:
  inception:
    driver: bridge
volumes:
  wordpress_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/rjaada/data/wordpress_files
  wordpress_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/rjaada/data/wordpress_db